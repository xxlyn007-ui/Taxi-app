name: EAS Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm ci --legacy-peer-deps
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: eas init --non-interactive --force
      - name: EAS Build
        id: easbuild
        continue-on-error: true
        run: eas build --platform android --profile preview --non-interactive --json > build-result.json
      - name: Show build result
        run: cat build-result.json || true
      - name: Extract build ID and fetch logs
        run: |
          BUILD_ID=$(node -e "try{const j=JSON.parse(require('fs').readFileSync('build-result.json','utf8'));console.log(Array.isArray(j)?j[0].id:j.id)}catch(e){console.log('')}")
          echo "Build ID: $BUILD_ID"
          if [ -n "$BUILD_ID" ]; then
            eas build:view "$BUILD_ID" --json || true
          fi
      - name: Fail job if build failed
        if: steps.easbuild.outcome == 'failure'
        run: exit 1
